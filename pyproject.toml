[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "pku-captain"
version = "0.0.1"
description = "Desktop AI assistant for PKU students."
requires-python = ">=3.11"
dependencies = [
    "PyQt6>=6.6",
    "requests>=2.31",
    "numpy>=1.26",
]

[project.optional-dependencies]
# Optional: renders LaTeX in chat bubbles via QWebEngine + MathJax. The chat
# panel degrades to plain rich-text when PyQt6-WebEngine is not installed, so
# this stays out of the hard dependency set.
math = [
    "PyQt6-WebEngine>=6.6",
]
dev = [
    "pytest>=8.0",
    "ruff>=0.4",
    "mypy>=1.10",
]

[project.scripts]
pku-captain = "src.__main__:main"

[tool.hatch.build.targets.wheel]
packages = ["src"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "N"]
